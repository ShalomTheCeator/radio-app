name: Build Radio App APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Radio App (Debug)
        run: |
          cordova create radioApp com.radio.global "GlobalRadio"
          cp -r www/* radioApp/www/
          cp config.xml radioApp/
          cd radioApp
          cordova platform add android
          cordova plugin add cordova-plugin-streaming-media
          cordova plugin add cordova-plugin-background-mode
          cordova build android
          cd ..

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: global-radio-app
          path: radioApp/platforms/android/app/build/outputs/apk/debug/*.apk
