name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Build App
        run: |
          cordova create app com.radio.global "GlobalRadio"
          cp -r www/* app/www/
          cp config.xml app/
          cd app
          cordova platform add android
          cordova build android
          cd ..
          
          # THIS FINDS THE APK AND COPIES IT TO ROOT
          find . -name "*.apk" -exec cp {} ./myapp.apk \;
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: global-radio-apk
          path: myapp.apk
