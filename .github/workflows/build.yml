name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Build App
        run: |
          # Create project
          cordova create MyApp com.myapp.test "MyApp"
          
          # Copy your files
          cp -r www/* MyApp/www/
          cp config.xml MyApp/
          
          # Build
          cd MyApp
          cordova platform add android
          cordova build android
          
          # Verify APK exists
          echo "=== CHECKING FOR APK ==="
          ls -la platforms/android/app/build/outputs/apk/debug/
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          # CORRECT PATH - NOTICE "outputs" not "output/tmp"
          path: MyApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
