name: Build Radio App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Cordova App
        run: |
          # Create new Cordova project
          cordova create myapp com.radio.global "GlobalRadio"
          
          # Copy your files
          cp -r www/* myapp/www/
          cp config.xml myapp/
          
          # Enter project
          cd myapp
          
          # Add Android platform
          cordova platform add android
          
          # Add plugins
          cordova plugin add cordova-plugin-streaming-media
          cordova plugin add cordova-plugin-background-mode
          
          # Build the APK
          cordova build android
          
          # Go back
          cd ..
          
          # Find the APK and copy it to root
          echo "Searching for APK..."
          find myapp -name "*.apk" -exec cp {} ./app.apk \; 2>/dev/null || echo "APK not found yet"
          
          # List files to verify
          ls -la *.apk 2>/dev/null || echo "No APK in root"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: global-radio-app
          path: app.apk
